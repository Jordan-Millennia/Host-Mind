<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HostMind</title>
    <script>
      // GitHub Pages SPA redirect: preserve path + query so client routing works.
      // Redirects to index.html with the original path encoded in the query string.
      (function () {
        var pathSegmentsToKeep = 1; // number of path segments in base (/hostmind/)
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        )
      })()
    </script>
  </head>
  <body></body>
</html>
