name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: roomos_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roomos_ci?schema=public
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
      CLERK_SECRET_KEY: sk_test_dummy
      CLERK_WEBHOOK_SECRET: whsec_dummy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      REDIS_URL: redis://localhost:6379
      WORKER_API_KEY: ci_worker_key
      WEB_BASE_URL: http://localhost:3000
    defaults:
      run:
        working-directory: ./roomos
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: roomos/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Apply migrations to CI Postgres
        run: pnpm db:migrate:deploy
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Migration drift check
        run: |
          # Prisma's `migrate diff --from-migrations` needs a shadow DB to
          # replay migrations into. Spin one up alongside the CI Postgres.
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "CREATE DATABASE roomos_drift;"
          pnpm --filter @roomos/db exec prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "postgresql://postgres:postgres@localhost:5432/roomos_drift?schema=public" \
            --exit-code
